syntax = "proto3";

package user;

option go_package = "github.com/Kai120789/learning_platform/learning_platform_proto/protos/gen/go/user";

service User {
  rpc CreateUser (CreateUserRequest) returns (CreateUserResponse);
  rpc GetUserById (GetUserByIdRequest) returns (GetUserByIdResponse);
  rpc GetUserByEmail (GetUserByEmailRequest) returns (GetUserByEmailResponse);
  rpc GetAllUsersWithData (GetAllUsersWithDataRequest) returns (GetAllUsersWithDataResponse);
  rpc GetUserData (GetUserDataRequest) returns (GetUserDataResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ChangeEmail (ChangeEmailRequest) returns (ChangeEmailResponse);
  rpc UpdateUserInfo (UpdateUserInfoRequest) returns (UpdateUserInfoResponse);
  rpc UpdateUserSettings (UpdateUserSettingsRequest) returns (UpdateUserSettingsResponse);
  rpc UpdateUserTheme (UpdateUserThemeRequest) returns (UpdateUserThemeResponse);
  rpc UpdateUserAvatar (UpdateUserAvatarRequest) returns (UpdateUserAvatarResponse);
  rpc GetUsersShortInfo (GetUsersShortInfoRequest) returns (GetUsersShortInfoResponse);
  rpc UpdateUserTgUsername (UpdateUserTgUsernameRequest) returns (UpdateUserTgUsernameResponse);
}

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  TUTOR = 1;
  STUDENT = 2;
  ADMIN = 3;
}

enum UserStatus {
  STATUS_UNSPECIFIED = 0;
  ACTIVE = 1;
  INACTIVE= 2;
  BANNED = 3;
}

enum UserGender {
  ENUM_GENDER_UNSPECIFIED = 0;
  MALE = 1;
  FEMALE = 2;
  UNKNOWN = 3;
}

enum UserTheme {
  ENUM_THEME_UNSPECIFIED = 0;
  LIGHT = 1;
  DARK = 2;
}

enum UserLanguage {
  ENUM_LANGUAGE_UNSPECIFIED = 0;
  RU = 1;
  EN = 2;
}

message Date {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

message UserShortInfo {
  int64 id = 1;
  string name = 2;
  string surname = 3;
  optional string patronymic = 4;
  optional string tg_username = 5;
}

message CreateUserRequest {
  string email = 1;
  string name = 2;
  string surname = 3;
  optional string patronymic = 4;
  UserRole role = 5;
  UserGender gender = 6;
  UserLanguage language = 7;
  string password_hash = 8;
  optional Date birth_date = 9;
}

message CreateUserResponse {
  int64 user_id = 1;
}

message GetUserByIdRequest {
  int64 user_id = 1;
}

message GetUserByIdResponse {
  int64 user_id = 1;
  string email = 2;
  string password_hash = 3;
  UserRole role = 4;
  UserStatus status = 5;
}

message GetUserDataRequest {
  int64 user_id = 1;
}

message GetUserDataResponse {
  int64 user_id = 1;
  string email = 2;
  UserRole role = 3;
  UserStatus status = 4;
  UpdateUserInfoResponse user_info = 5;
  UpdateUserSettingsResponse user_settings = 6;
}

message ChangePasswordRequest {
  int64 user_id = 1;
  string new_password = 2;
}

message ChangePasswordResponse {}

message ChangeEmailRequest {
  int64 user_id = 1;
  string new_email = 2;
}

message ChangeEmailResponse {}

message UpdateUserInfoRequest {
  int64 user_id = 1;
  string name = 2;
  string surname = 3;
  optional string patronymic = 4;
  optional string city = 5;
  optional string about = 6;
  UserGender gender = 7;
  optional Date birth_date = 8;
}

message UpdateUserInfoResponse {
  string name = 1;
  string surname = 2;
  optional string patronymic = 3;
  optional string tg_username = 4;
  optional string city = 5;
  optional string about = 6;
  optional string avatar = 7;
  UserGender gender = 8;
  optional Date birth_date = 9;
}

message UpdateUserSettingsRequest {
  int64 user_id = 1;
  bool is_2_fa_enabled = 2;
  bool is_notifications_enabled = 3;
  UserLanguage language = 4;
}

message UpdateUserSettingsResponse {
  bool is_2_fa_enabled = 1;
  bool is_notifications_enabled = 2;
  UserLanguage language = 3;
  UserTheme theme = 4;
}

message GetUserByEmailRequest {
  string email = 1;
}

message GetUserByEmailResponse {
  int64 user_id = 1;
  string email = 2;
  string password_hash = 3;
  UserRole role = 4;
  UserStatus status = 5;
}

message GetAllUsersWithDataRequest {}

message GetAllUsersWithDataResponse {
  repeated GetUserDataResponse users = 1;
}

message UpdateUserThemeRequest {
  int64 user_id = 1;
  UserTheme theme = 2;
}

message UpdateUserThemeResponse {}

message UpdateUserAvatarRequest {
  int64 user_id = 1;
  string avatar_url = 2;
}

message UpdateUserAvatarResponse {}

message GetUsersShortInfoRequest {
  repeated int64 user_ids = 1;
}

message GetUsersShortInfoResponse {
  repeated UserShortInfo users = 1;
}

message UpdateUserTgUsernameRequest {
  int64 user_id = 1;
  string tg_username = 2;
}

message UpdateUserTgUsernameResponse {}
