syntax = "proto3";

package auth;

option go_package = "github.com/Kai120789/learning_platform/learning_platform_proto/protos/gen/go/auth";

service Auth {
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc RefreshTokens (RefreshTokensRequest) returns (RefreshTokensResponse);
  rpc CheckPassword (CheckPasswordRequest) returns (CheckPasswordResponse);
  rpc GeneratePasswordHash (GeneratePasswordHashRequest) returns (GeneratePasswordHashResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
  rpc LogoutAll (LogoutAllRequest) returns (LogoutAllResponse);
  rpc ChangePassword (ChangePasswordRequest) returns (ChangePasswordResponse);
  rpc ForceChangePassword (ForceChangePasswordRequest) returns (ForceChangePasswordResponse);
  rpc ChangeEmail (ChangeEmailRequest) returns (ChangeEmailResponse);
  rpc ForceChangeEmail (ForceChangeEmailRequest) returns (ForceChangeEmailResponse);
}

enum UserRole {
  ENUM_NAME_UNSPECIFIED = 0;
  TUTOR = 1;
  STUDENT = 2;
}

enum UserGender {
  ENUM_GENDER_UNSPECIFIED = 0;
  MALE = 1;
  FEMALE = 2;
}

enum UserLanguage {
  ENUM_LANGUAGE_UNSPECIFIED = 0;
  RU = 1;
  EN = 2;
}

message Date {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

message LoginRequest {
  int64 user_id = 1;
  string email = 2;
  string password = 3;
}

message LoginResponse  {
  string session_id = 1;
}

message RegisterRequest {
  int64 user_id = 1;
  string email = 2;
  string name = 3;
  string surname = 4;
  optional string patronymic = 5;
  UserRole role = 6;
  UserGender gender = 7;
  UserLanguage language = 8;
  optional Date birth_date = 9;
  string password = 10;
}

message RegisterResponse {
  string session_id = 1;
}

message RefreshTokensRequest {}

message RefreshTokensResponse {
  string access_token = 1;
}

message CheckPasswordRequest {
  string password = 1;
  string password_hash = 2;
}

message CheckPasswordResponse {
  bool is_valid = 1;
}

message GeneratePasswordHashRequest {
  string password = 1;
}
message GeneratePasswordHashResponse {
  string password_hash = 1;
}

message LogoutRequest {}

message LogoutResponse {}

message LogoutAllRequest {
  int64 user_id = 1;
}

message LogoutAllResponse {}

message ChangePasswordRequest {
  int64 user_id = 1;
  string old_password = 2;
  string new_password = 3;
}

message ChangePasswordResponse {
  string session_id = 1;
}

message ForceChangePasswordRequest {
  int64 user_id = 1;
  string new_password = 2;
}

message ForceChangePasswordResponse {}

message ChangeEmailRequest {
  int64 user_id = 1;
  string new_email = 2;
}

message ChangeEmailResponse {
  string session_id = 1;
}

message ForceChangeEmailRequest {
  int64 user_id = 1;
  string new_email = 2;
}

message ForceChangeEmailResponse {}
