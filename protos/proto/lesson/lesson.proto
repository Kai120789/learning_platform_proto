syntax = "proto3";

import "google/protobuf/timestamp.proto";

package lesson;

option go_package = "github.com/Kai120789/learning_platform/learning_platform_proto/protos/gen/go/group";

service Lesson {
  rpc GetOneLesson (GetOneLessonRequest) returns (GetOneLessonResponse);
  rpc GetLessonsByUserId (GetLessonsByUserIdRequest) returns (GetLessonsByUserIdResponse);
  rpc CreateLesson (CreateLessonRequest) returns (CreateLessonResponse);
  rpc UpdateLesson (UpdateLessonRequest) returns (UpdateLessonResponse);
  rpc CancelLesson (CancelLessonRequest) returns (CancelLessonResponse);
  rpc GetLessonsByTutorId (GetLessonsByTutorIdRequest) returns (GetLessonsByTutorIdResponse);
  rpc GetLessonsByGroupId (GetLessonsByGroupIdRequest) returns (GetLessonsByGroupIdResponse);
}

message GetOneLessonRequest {
  int64 id = 1;
}

enum LessonStatus {
    LESSON_STATUS_UNSPECIFIED = 0;
    SCHEDULED = 1;
    IN_PROCESS = 2;
    COMPLETED = 3;
    CANCELLED = 4;
}

enum MediaType {
  MEDIA_TYPE_UNSPECIFIED = 0;
  IMAGE = 1;
  VIDEO = 2;
}

message MediaItem {
  int64 id = 1;
  int64 lesson_id = 2;
  string s3_link = 3;
  string s3_preview = 4;
  MediaType type = 5;
}

message GetOneLessonResponse {
  int64 id = 1;
  int64 group_id = 2;
  optional int64 board_id = 3;
  optional string meet_link = 4;
  google.protobuf.Timestamp start_time = 5;
  repeated MediaItem media_items = 6;
  int64 duration = 7;
  int64 tutor_id = 8;
  LessonStatus status = 9;
}

message GetLessonsByUserIdRequest {
  int64 user_id = 1;
}

message GetLessonsByUserIdResponse {
  repeated GetOneLessonResponse lessons = 1;
}

message CreateLessonRequest {
  int64 group_id = 1;
  optional int64 board_id = 2;
  optional string meet_link = 3;
  google.protobuf.Timestamp start_time = 4;
  repeated MediaItem media_items = 5;
  int64 duration = 6;
  int64 tutor_id = 7;
}

message CreateLessonResponse {
  int64 id = 1;
  int64 group_id = 2;
  optional int64 board_id = 3;
  optional string meet_link = 4;
  google.protobuf.Timestamp start_time = 5;
  repeated MediaItem media_items = 6;
  int64 duration = 7;
  int64 tutor_id = 8;
  LessonStatus status = 9;
}

message UpdateLessonRequest {
  int64 id = 1;
  int64 group_id = 2;
  optional int64 board_id = 3;
  optional string meet_link = 4;
  google.protobuf.Timestamp start_time = 5;
  repeated MediaItem media_items = 6;
  int64 duration = 7;
  repeated int64 deleted_media_ids = 8;
}

message UpdateLessonResponse {
  int64 id = 1;
  int64 group_id = 2;
  optional int64 board_id = 3;
  optional string meet_link = 4;
  google.protobuf.Timestamp start_time = 5;
  repeated MediaItem media_items = 6;
  int64 duration = 7;
  int64 tutor_id = 8;
  LessonStatus status = 9;
}

message CancelLessonRequest {
  int64 id = 1;
}

message CancelLessonResponse {}

message GetLessonsByTutorIdRequest {
  int64 tutor_id = 1;
}

message GetLessonsByTutorIdResponse {
  repeated GetOneLessonResponse lessons = 1;
}

message GetLessonsByGroupIdRequest {
  int64 group_id = 1;
}

message GetLessonsByGroupIdResponse {
  repeated GetOneLessonResponse lessons = 1;
}
